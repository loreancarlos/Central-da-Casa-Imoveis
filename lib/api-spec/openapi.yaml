openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Central da Casa Property Finder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clientes
    description: Client operations
  - name: imoveis
    description: Property operations
  - name: matches
    description: Match operations
  - name: dashboard
    description: Dashboard statistics
  - name: fontes
    description: Import source operations
  - name: connectors
    description: Connector registry operations
  - name: importacoes
    description: Import history operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      description: Returns totals for clients, properties, and matches
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /clientes:
    get:
      operationId: listClientes
      tags: [clientes]
      summary: List all clients
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteList"
    post:
      operationId: createCliente
      tags: [clientes]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClienteInput"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"

  /clientes/{id}:
    get:
      operationId: getCliente
      tags: [clientes]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        "404":
          description: Not found
    put:
      operationId: updateCliente
      tags: [clientes]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClienteInput"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        "404":
          description: Not found
    delete:
      operationId: deleteCliente
      tags: [clientes]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /imoveis:
    get:
      operationId: listImoveis
      tags: [imoveis]
      summary: List all properties
      parameters:
        - name: cidade
          in: query
          schema:
            type: ["string", "null"]
        - name: bairro
          in: query
          schema:
            type: ["string", "null"]
        - name: tipo
          in: query
          schema:
            type: ["string", "null"]
        - name: precoMin
          in: query
          schema:
            type: ["number", "null"]
        - name: precoMax
          in: query
          schema:
            type: ["number", "null"]
        - name: quartos
          in: query
          schema:
            type: ["integer", "null"]
        - name: banheiros
          in: query
          schema:
            type: ["integer", "null"]
        - name: vagas
          in: query
          schema:
            type: ["integer", "null"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImovelList"

  /imoveis/{id}:
    get:
      operationId: getImovel
      tags: [imoveis]
      summary: Get a property by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Imovel"
        "404":
          description: Not found

  /imoveis/{id}/preco:
    patch:
      operationId: updateImovelPreco
      tags: [imoveis]
      summary: Update property price
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImovelPrecoUpdate"
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Imovel"
        "404":
          description: Not found

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List all matches
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"

  /matches/cliente/{clienteId}:
    get:
      operationId: getMatchesForCliente
      tags: [matches]
      summary: Get matches for a client (calculates scores)
      parameters:
        - name: clienteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scored matches for client
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchResult"
        "404":
          description: Client not found

  /fontes:
    get:
      operationId: listFontes
      tags: [fontes]
      summary: List all import sources
      responses:
        "200":
          description: List of import sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FonteImportacao"
    post:
      operationId: createFonte
      tags: [fontes]
      summary: Create an import source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FonteImportacaoInput"
      responses:
        "201":
          description: Created import source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FonteImportacao"

  /fontes/{id}:
    get:
      operationId: getFonte
      tags: [fontes]
      summary: Get an import source by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Import source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FonteImportacao"
        "404":
          description: Not found
    put:
      operationId: updateFonte
      tags: [fontes]
      summary: Update an import source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FonteImportacaoInput"
      responses:
        "200":
          description: Updated import source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FonteImportacao"
        "404":
          description: Not found
    delete:
      operationId: deleteFonte
      tags: [fontes]
      summary: Delete an import source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /connectors:
    get:
      operationId: listConnectors
      tags: [connectors]
      summary: List registered connectors
      responses:
        "200":
          description: List of connectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectorInfo"

  /connectors/{nome}/importar:
    post:
      operationId: runConnectorImport
      tags: [connectors]
      summary: Run import for a connector
      parameters:
        - name: nome
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportStats"
        "404":
          description: Connector not found

  /importacoes:
    get:
      operationId: listImportacoes
      tags: [importacoes]
      summary: List import history
      responses:
        "200":
          description: List of import history records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoricoImportacao"

  /matches/{id}/status:
    patch:
      operationId: updateMatchStatus
      tags: [matches]
      summary: Update match status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchStatusUpdate"
      responses:
        "200":
          description: Updated match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardStats:
      type: object
      required: [totalClientes, totalImoveis, totalMatches, imovelPorTipo]
      properties:
        totalClientes:
          type: integer
        totalImoveis:
          type: integer
        totalMatches:
          type: integer
        imovelPorTipo:
          type: array
          items:
            $ref: "#/components/schemas/ImovelTipoCount"

    ImovelTipoCount:
      type: object
      required: [tipo, count]
      properties:
        tipo:
          type: string
        count:
          type: integer

    Cliente:
      type: object
      required: [id, nome, telefone, tipoImovelDesejado, cidade, precoMinimo, precoMaximo, quartosMinimos, createdAt, updatedAt]
      properties:
        id:
          type: integer
        nome:
          type: string
        telefone:
          type: string
        tipoImovelDesejado:
          type: string
        cidade:
          type: string
        bairroPreferido:
          type: ["string", "null"]
        precoMinimo:
          type: number
        precoMaximo:
          type: number
        quartosMinimos:
          type: integer
        observacoes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ClienteInput:
      type: object
      required: [nome, telefone, tipoImovelDesejado, cidade, precoMinimo, precoMaximo, quartosMinimos]
      properties:
        nome:
          type: string
          minLength: 1
        telefone:
          type: string
          minLength: 1
        tipoImovelDesejado:
          type: string
          minLength: 1
        cidade:
          type: string
          minLength: 1
        bairroPreferido:
          type: ["string", "null"]
        precoMinimo:
          type: number
        precoMaximo:
          type: number
        quartosMinimos:
          type: integer
        observacoes:
          type: ["string", "null"]

    ClienteList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Cliente"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Imovel:
      type: object
      required: [id, fonte, tipo, cidade, bairro, preco, area, quartos, banheiros, vagas, createdAt, updatedAt]
      properties:
        id:
          type: integer
        fonte:
          type: string
        identificadorOrigem:
          type: ["string", "null"]
        codigoExterno:
          type: ["string", "null"]
        tipo:
          type: string
        cidade:
          type: string
        bairro:
          type: string
        preco:
          type: number
        area:
          type: number
        quartos:
          type: integer
        banheiros:
          type: integer
        vagas:
          type: integer
        descricao:
          type: ["string", "null"]
        urlOriginal:
          type: ["string", "null"]
        fotos:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    ImovelList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Imovel"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Match:
      type: object
      required: [id, clienteId, imovelId, score, status, createdAt]
      properties:
        id:
          type: integer
        clienteId:
          type: integer
        imovelId:
          type: integer
        score:
          type: number
        status:
          type: string
          enum: [NOVO, VISUALIZADO, INTERESSADO, DESCARTADO]
        createdAt:
          type: string

    MatchResult:
      type: object
      required: [matchId, score, status, imovel]
      properties:
        matchId:
          type: integer
        score:
          type: number
        status:
          type: string
          enum: [NOVO, VISUALIZADO, INTERESSADO, DESCARTADO]
        imovel:
          $ref: "#/components/schemas/Imovel"

    ImovelPrecoUpdate:
      type: object
      required: [preco]
      properties:
        preco:
          type: number
          minimum: 0

    MatchStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [NOVO, VISUALIZADO, INTERESSADO, DESCARTADO]

    FonteImportacao:
      type: object
      required: [id, nome, url, ativo, createdAt, updatedAt]
      properties:
        id:
          type: integer
        nome:
          type: string
        url:
          type: string
        ativo:
          type: boolean
        ultimaExecucao:
          type: ["string", "null"]
        ultimoStatus:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    FonteImportacaoInput:
      type: object
      required: [nome, url]
      properties:
        nome:
          type: string
          minLength: 1
        url:
          type: string
          minLength: 1
        ativo:
          type: boolean
          default: true
        ultimaExecucao:
          type: ["string", "null"]
        ultimoStatus:
          type: ["string", "null"]

    ConnectorInfo:
      type: object
      required: [nome]
      properties:
        nome:
          type: string

    ImportStats:
      type: object
      required: [sucesso, importados, atualizados, ignorados]
      properties:
        sucesso:
          type: boolean
        importados:
          type: integer
        atualizados:
          type: integer
        ignorados:
          type: integer

    HistoricoImportacao:
      type: object
      required: [id, fonte, inicioExecucao, totalImportados, totalAtualizados, totalIgnorados, status, createdAt]
      properties:
        id:
          type: integer
        fonte:
          type: string
        inicioExecucao:
          type: string
        fimExecucao:
          type: ["string", "null"]
        totalImportados:
          type: integer
        totalAtualizados:
          type: integer
        totalIgnorados:
          type: integer
        status:
          type: string
        mensagem:
          type: ["string", "null"]
        createdAt:
          type: string
